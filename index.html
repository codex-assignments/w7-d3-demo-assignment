<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="app.js" defer></script>
</head>
<body class="m-10">
    <header>
        <h1 class="text-xl font-bold">Worker's Demo</h1>
    </header>
    <main>
        <output>
            <div class="h-40 bg-gray-200" id="output"></div>
        </output>
        <section>
            <form action="submit" id="inputArea">
                <label class="" for="prompt">
                    <span class="font-bold">What would you like to know?</span>
                    <textarea class="border" name="prompt" id="prompt" cols="100" rows="10" placeholder="Enter your question here."></textarea>
                </label>
                <button class="border rounded-sm px-4 bg-gray-300 ">Send</button>
            </form>
        </section>
    </main>
    <footer>Copyright Ashley Flynn &copy;</footer>

</body>
</html>
